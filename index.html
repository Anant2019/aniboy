<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANI BOY | THE AURA ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #000; --bg: #fff; --text: #000; }
        .mode-rebel { --accent: #ff3c00; --bg: #0b0b0b; --text: #fff; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text); 
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            overflow-x: hidden;
        }
        .unbounded { font-family: 'Unbounded', sans-serif; }

        /* The Customizer Canvas */
        #shirt-canvas {
            background-image: url('https://images.unsplash.com/photo-1521572267360-ee0c2909d518?q=80&w=1000');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 0.5s ease;
        }
        
        .vibe-card { background: rgba(128,128,128,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(128,128,128,0.1); }
        
        /* Cursor Styling */
        #cursor { width: 10px; height: 10px; background: var(--text); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; mix-blend-mode: difference; }

        /* Cart & UI */
        #cart-sidebar { transform: translateX(100%); transition: transform 0.5s ease; background: var(--bg); border-left: 1px solid rgba(128,128,128,0.2); z-index: 1000; }
        .cart-open #cart-sidebar { transform: translateX(0); }
        
        .custom-logo { position: absolute; max-width: 80px; opacity: 0.8; pointer-events: none; }
    </style>
</head>
<body class="selection:bg-orange-500 selection:text-white">

    <div id="cursor"></div>

    <nav class="fixed top-0 w-full z-[100] p-8 flex justify-between items-center mix-blend-difference text-white">
        <div class="unbounded text-2xl font-black italic">ani boy.</div>
        
        <div class="flex bg-white/10 p-1 rounded-full border border-white/20 backdrop-blur-md">
            <button onclick="setMode('on')" id="btn-on" class="px-6 py-2 rounded-full text-[10px] font-black uppercase transition-all bg-white text-black">On Duty</button>
            <button onclick="setMode('off')" id="btn-off" class="px-6 py-2 rounded-full text-[10px] font-black uppercase transition-all text-white">Off Duty</button>
        </div>

        <div class="flex gap-6 text-[10px] font-black uppercase tracking-widest">
            <span class="cursor-pointer" onclick="toggleCart(true)">Bag (<span id="cart-count">0</span>)</span>
        </div>
    </nav>

    <section class="min-h-screen pt-32 pb-20 px-8">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
            
            <div class="lg:col-span-7 relative h-[600px] md:h-[800px] vibe-card rounded-[3rem] overflow-hidden flex items-center justify-center">
                <div class="absolute top-8 left-8 flex flex-col gap-2">
                    <span class="unbounded text-[10px] font-black opacity-40 uppercase tracking-[0.3em]">Live_Custom_Engine_V2</span>
                    <h2 class="unbounded text-2xl font-black italic uppercase">The Lab.</h2>
                </div>

                <div id="shirt-canvas" class="w-full h-full relative flex items-center justify-center">
                    <img id="placed-logo" src="" class="custom-logo hidden" alt="Custom Logo">
                </div>

                <div class="absolute bottom-10 flex gap-4">
                    <button onclick="changeShirtColor('none')" class="w-10 h-10 rounded-full border-2 border-white bg-white shadow-xl"></button>
                    <button onclick="changeShirtColor('hue-rotate(220deg) brightness(0.8)')" class="w-10 h-10 rounded-full border-2 border-white bg-blue-900 shadow-xl"></button>
                    <button onclick="changeShirtColor('invert(1) brightness(0.2)')" class="w-10 h-10 rounded-full border-2 border-white bg-black shadow-xl"></button>
                    <button onclick="changeShirtColor('hue-rotate(320deg) saturate(2)')" class="w-10 h-10 rounded-full border-2 border-white bg-pink-600 shadow-xl"></button>
                </div>
            </div>

            <div class="lg:col-span-5 space-y-10">
                <div class="space-y-4">
                    <h1 class="unbounded text-6xl font-black leading-none italic uppercase">Create <br> Your <span class="text-zinc-300">Aura.</span></h1>
                    <p class="text-zinc-500 font-medium">Upload your corporate logo or your personal rebel tag. Our AI stitches it into our high-performance silk-knit fabric instantly.</p>
                </div>

                <div class="space-y-6">
                    <label class="group block cursor-pointer vibe-card rounded-[2rem] p-10 text-center border-dashed border-2 border-zinc-200 hover:border-black transition-all">
                        <div class="flex flex-col items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-zinc-100 flex items-center justify-center group-hover:bg-black group-hover:text-white transition-all">
                                <b>+</b>
                            </div>
                            <span class="unbounded text-[10px] font-black tracking-widest uppercase">Upload Your Brand Logo</span>
                        </div>
                        <input type="file" class="hidden" onchange="handleFileUpload(event)">
                    </label>

                    <div class="flex justify-between items-center border-b border-zinc-100 pb-4">
                        <span class="unbounded text-xs font-black uppercase tracking-widest">Pricing Model</span>
                        <span class="font-mono text-xl">₹6,499</span>
                    </div>

                    <button onclick="addToCart('Custom Aura Shirt')" class="w-full bg-black text-white py-8 rounded-full unbounded text-[10px] font-black uppercase tracking-[0.4em] hover:scale-105 transition-all shadow-2xl">
                        Add to Collection
                    </button>
                </div>
            </div>

        </div>
    </section>

    <section class="py-20 bg-zinc-50 px-8 text-black">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
            <div class="unbounded text-4xl font-black italic opacity-20 italic">ANI BOY.</div>
            <div class="flex gap-12 text-[10px] font-black uppercase tracking-widest">
                <a href="#">Corporate Inquiry</a>
                <a href="#">Bulk Drops</a>
                <a href="#">Pune Store</a>
            </div>
        </div>
    </section>

    <div id="cart-sidebar" class="fixed top-0 right-0 w-full md:w-[450px] h-full p-10 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center border-b border-zinc-100 pb-8 mb-8">
            <h3 class="unbounded text-xl font-black italic uppercase">Bag</h3>
            <button onclick="toggleCart(false)" class="font-bold text-[10px] uppercase">Close [X]</button>
        </div>
        <div id="cart-items" class="flex-grow flex flex-col gap-6 overflow-y-auto">
            </div>
        <div class="pt-8 border-t border-zinc-100 mt-auto">
            <div class="flex justify-between mb-8 font-black uppercase text-xs">
                <span>Total</span>
                <span id="cart-total">₹0</span>
            </div>
            <button class="w-full bg-black text-white py-6 rounded-full unbounded text-[10px] font-black tracking-[0.3em]">Secure Checkout</button>
        </div>
    </div>

    <script>
        // 1. Smooth Cursor Logic
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.2 });
        });

        // 2. Mode Toggle (On Duty / Off Duty)
        function setMode(mode) {
            const body = document.body;
            const btnOn = document.getElementById('btn-on');
            const btnOff = document.getElementById('btn-off');

            if(mode === 'off') {
                body.classList.add('mode-rebel');
                btnOff.className = "px-6 py-2 rounded-full text-[10px] font-black uppercase bg-orange-600 text-white";
                btnOn.className = "px-6 py-2 rounded-full text-[10px] font-black uppercase text-white";
                gsap.to(body, { backgroundColor: "#0b0b0b", color: "#fff", duration: 0.6 });
            } else {
                body.classList.remove('mode-rebel');
                btnOn.className = "px-6 py-2 rounded-full text-[10px] font-black uppercase bg-white text-black";
                btnOff.className = "px-6 py-2 rounded-full text-[10px] font-black uppercase text-white";
                gsap.to(body, { backgroundColor: "#fff", color: "#000", duration: 0.6 });
            }
        }

        // 3. Aura Customizer Engine
        function changeShirtColor(filter) {
            gsap.to("#shirt-canvas", { filter: filter, duration: 0.8 });
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            const logo = document.getElementById('placed-logo');
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    logo.src = e.target.result;
                    logo.classList.remove('hidden');
                    gsap.from(logo, { scale: 0, opacity: 0, rotation: 45, duration: 1, ease: "back.out(1.7)" });
                }
                reader.readAsDataURL(file);
            }
        }

        // 4. E-Commerce Logic
        let cart = [];
        function addToCart(name) {
            cart.push({ name: name, price: 6499 });
            updateCartUI();
            toggleCart(true);
        }

        function updateCartUI() {
            const count = document.getElementById('cart-count');
            const itemsList = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total');
            
            count.innerText = cart.length;
            itemsList.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center p-4 vibe-card rounded-2xl">
                    <span class="text-[10px] font-black uppercase italic">${item.name}</span>
                    <span class="text-xs font-mono">₹${item.price}</span>
                </div>
            `).join('');
            
            const total = cart.reduce((acc, curr) => acc + curr.price, 0);
            totalDisplay.innerText = `₹${total.toLocaleString()}`;
        }

        function toggleCart(open) {
            if(open) document.body.classList.add('cart-open');
            else document.body.classList.remove('cart-open');
        }
    </script>
</body>
</html>
