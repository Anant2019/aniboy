<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ani boy. | Engineering Your Aura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff41; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; color: #000; overflow-x: hidden; }
        .sync { font-family: 'Syncopate', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); }
        .bento-card { transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; overflow: hidden; border: 1px solid #eee; }
        .bento-card:hover { transform: translateY(-10px); box-shadow: 0 40px 80px rgba(0,0,0,0.1); border-color: #000; }
        .custom-image { transition: filter 0.8s ease, transform 0.8s ease; }
        #cursor-ball { pointer-events: none; position: fixed; top: 0; left: 0; width: 12px; height: 12px; background: #000; border-radius: 50%; z-index: 999; }
    </style>
</head>
<body>

    <div id="cursor-ball"></div>

    <nav class="fixed top-0 w-full z-[100] glass border-b border-gray-100 px-6 py-5 flex justify-between items-center">
        <div class="sync text-xl tracking-tighter uppercase font-bold">ani boy<span class="text-zinc-400">.</span></div>
        <div class="hidden md:flex gap-12 text-[10px] font-extrabold uppercase tracking-widest">
            <a href="#" class="hover:line-through">Shop</a>
            <a href="#" class="hover:line-through">The Lab</a>
            <a href="#" class="hover:line-through">Archive</a>
        </div>
        <div class="flex gap-4 items-center">
            <span class="text-[10px] font-bold">IN / PUNE</span>
            <div class="w-10 h-10 bg-black rounded-full flex items-center justify-center text-white text-xs">0</div>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col pt-32 px-6">
        <div class="max-w-7xl mx-auto w-full">
            <div class="flex flex-col md:flex-row justify-between items-end mb-12">
                <h1 class="sync text-6xl md:text-[12vw] leading-none uppercase hero-text">
                    AURA<br><span class="text-zinc-200">SHIFT</span>
                </h1>
                <div class="max-w-xs text-right space-y-4 pb-4">
                    <p class="text-xs font-medium uppercase tracking-tighter text-zinc-500">2026 Collection — Drop 01</p>
                    <p class="text-sm leading-relaxed font-semibold">Corporate textiles re-engineered for the streetwear generation.</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 pb-20">
                <div class="md:col-span-2 h-[600px] bento-card rounded-[2rem] relative bg-zinc-100 p-12 flex flex-col justify-between" onclick="triggerAura()">
                    <div class="z-10">
                        <span class="bg-black text-white px-3 py-1 text-[10px] rounded-full uppercase tracking-widest font-bold">New Technology</span>
                        <h2 class="text-4xl font-extrabold mt-4 italic uppercase">Design Your <br> Own Fit.</h2>
                    </div>
                    
                    <div class="absolute inset-0 flex items-center justify-center p-20">
                        <img id="main-shirt" src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&q=80&w=800" 
                             alt="Trendy Shirt" class="w-full h-full object-contain custom-image drop-shadow-2xl">
                    </div>

                    <div class="z-10 flex gap-4">
                        <button onclick="updateAura('grayscale(1)')" class="w-10 h-10 rounded-full border border-black bg-zinc-400"></button>
                        <button onclick="updateAura('hue-rotate(90deg) saturate(2)')" class="w-10 h-10 rounded-full border border-black bg-purple-500"></button>
                        <button onclick="updateAura('none')" class="w-10 h-10 rounded-full border border-black bg-white"></button>
                    </div>
                </div>

                <div class="flex flex-col gap-4">
                    <div class="h-[290px] bento-card rounded-[2rem] bg-black text-white p-8 group">
                        <h3 class="text-2xl font-bold italic uppercase">Upload <br> Inspo.</h3>
                        <p class="text-[10px] text-zinc-500 mt-4 uppercase tracking-widest font-bold">AI Pattern Mapping</p>
                        <div class="mt-8 border-2 border-dashed border-zinc-700 h-20 rounded-xl flex items-center justify-center group-hover:border-white transition-all">
                             <span class="text-[10px] font-bold">DRAG PHOTO HERE</span>
                        </div>
                    </div>
                    <div class="h-[290px] bento-card rounded-[2rem] bg-zinc-100 relative overflow-hidden group">
                        <img src="https://images.unsplash.com/photo-1552374196-1ab2a1c593e8?auto=format&fit=crop&q=80&w=600" class="absolute inset-0 w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                        <div class="absolute inset-0 bg-black/20 p-8 flex items-end">
                            <span class="text-white font-bold uppercase tracking-widest text-xs">View Lookbook</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="p-12 border-t border-gray-100 flex flex-col md:flex-row justify-between items-center gap-8">
        <div class="sync text-sm font-bold italic">ani boy official.</div>
        <div class="flex gap-8 text-[10px] font-black uppercase tracking-widest text-zinc-400">
            <span>Instagram</span>
            <span>TikTok</span>
            <span>WhatsApp Lab</span>
        </div>
    </footer>

    <script>
        // Smooth Cursor
        const cursor = document.getElementById('cursor-ball');
        window.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX - 6, y: e.clientY - 6, duration: 0.3, ease: "power2.out" });
        });

        // Entrance Animations
        gsap.from(".hero-text", { opacity: 0, y: 100, duration: 1.2, ease: "expo.out", delay: 0.5 });
        gsap.from(".bento-card", { opacity: 0, y: 50, duration: 1, stagger: 0.2, ease: "power3.out", delay: 0.8 });

        // Aura Customization Function
        function updateAura(filterValue) {
            const shirt = document.getElementById('main-shirt');
            gsap.to(shirt, { 
                filter: filterValue, 
                scale: 1.05, 
                duration: 0.4, 
                onComplete: () => gsap.to(shirt, { scale: 1, duration: 0.4 }) 
            });
        }

        // Add magnetic effect to cards
        document.querySelectorAll('.bento-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                gsap.to(card, { x: x * 0.05, y: y * 0.05, duration: 0.4 });
            });
            card.addEventListener('mouseleave', () => {
                gsap.to(card, { x: 0, y: 0, duration: 0.4 });
            });
        });
    </script>
</body>
</html>
