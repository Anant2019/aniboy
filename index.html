<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ani boy | Custom Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .hero-image { animation: float 6s ease-in-out infinite; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .neo-brutalist { box-shadow: 8px 8px 0px #000; border: 3px solid #000; }
        body { cursor: crosshair; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white selection:bg-yellow-400 selection:text-black">

    <nav class="fixed top-0 w-full z-50 flex justify-between items-center p-6 mix-blend-difference">
        <div class="text-3xl font-black italic tracking-tighter">ani boy.</div>
        <div class="flex gap-6 items-center">
            <span class="text-[10px] tracking-[0.3em] font-bold uppercase hidden md:block">Future of Workwear</span>
            <div class="bg-white text-black p-2 rounded-full"><i data-lucide="shopping-bag" class="w-5 h-5"></i></div>
        </div>
    </nav>

    <main class="relative pt-32 px-6">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
            
            <div class="relative group">
                <div class="absolute -top-10 -left-10 w-64 h-64 bg-purple-600/20 rounded-full blur-3xl"></div>
                <div class="relative z-10 glass rounded-[40px] p-8 min-h-[500px] flex flex-col items-center justify-center overflow-hidden">
                    <span class="absolute top-6 left-8 text-[10px] font-bold text-black/40 tracking-widest uppercase">Live 3D Preview (V.1.0)</span>
                    
                    <div id="cloth-preview" class="hero-image w-72 h-96 bg-zinc-900 rounded-2xl border border-white/10 flex items-center justify-center transition-all duration-700 shadow-2xl">
                        <i data-lucide="shirt" class="w-32 h-32 text-zinc-700"></i>
                    </div>

                    <div class="mt-8 flex gap-4">
                        <button onclick="changeColor('#ffffff')" class="w-8 h-8 rounded-full border-2 border-white bg-white"></button>
                        <button onclick="changeColor('#7c3aed')" class="w-8 h-8 rounded-full border-2 border-transparent bg-purple-600"></button>
                        <button onclick="changeColor('#000000')" class="w-8 h-8 rounded-full border-2 border-transparent bg-black"></button>
                        <button onclick="changeColor('#16a34a')" class="w-8 h-8 rounded-full border-2 border-transparent bg-green-600"></button>
                    </div>
                </div>
            </div>

            <div class="space-y-8">
                <div>
                    <h1 class="text-6xl md:text-8xl font-black uppercase leading-tight italic">Design <br> Your <span class="text-transparent" style="-webkit-text-stroke: 1px white;">Aura.</span></h1>
                    <p class="text-zinc-400 mt-4 text-lg">Upload a photo, pick a vibe, or let AI generate your corporate-street fit. Your rules, our craft.</p>
                </div>

                <div class="space-y-4">
                    <div class="bg-zinc-900/50 p-1 rounded-2xl border border-zinc-800">
                        <div class="flex items-center px-4 py-2 border-b border-zinc-800">
                            <i data-lucide="sparkles" class="w-4 h-4 text-yellow-400 mr-2"></i>
                            <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-500">AI Personal Stylist</span>
                        </div>
                        <textarea placeholder="Describe your suit... 'Oversized blazer with neon graffiti patterns and silk lining'" class="w-full bg-transparent p-4 outline-none text-sm h-24 resize-none"></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer bg-white text-black p-6 flex flex-col items-center justify-center gap-2 font-black uppercase text-xs hover:bg-yellow-400 transition-all">
                            <i data-lucide="upload-cloud"></i>
                            Upload Inspo
                            <input type="file" class="hidden">
                        </label>
                        <button class="bg-zinc-800 p-6 flex flex-col items-center justify-center gap-2 font-black uppercase text-xs hover:bg-zinc-700 transition-all border border-zinc-700">
                            <i data-lucide="zap"></i>
                            Generate Fit
                        </button>
                    </div>

                    <button class="w-full bg-indigo-600 py-6 font-black uppercase tracking-[0.2em] italic hover:scale-[1.02] transition-transform shadow-[0_0_40px_rgba(79,70,229,0.4)]">
                        Bring it to Life — ₹4,999
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-20 flex justify-center md:hidden">
            <div class="animate-bounce flex flex-col items-center gap-2">
                <span class="text-[10px] uppercase font-bold text-zinc-500">Scroll to explore</span>
                <i data-lucide="chevron-down" class="w-4 h-4 text-zinc-500"></i>
            </div>
        </div>
    </main>

    <section class="mt-32 p-6 grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="h-40 bg-zinc-900 border border-zinc-800 flex items-center justify-center uppercase font-bold text-[10px] text-zinc-700">IG: @ani_boy_custom</div>
        <div class="h-40 bg-zinc-900 border border-zinc-800 flex items-center justify-center uppercase font-bold text-[10px] text-zinc-700">TikTok Trend</div>
        <div class="h-40 bg-zinc-900 border border-zinc-800 flex items-center justify-center uppercase font-bold text-[10px] text-zinc-700">Join the Lab</div>
        <div class="h-40 bg-zinc-900 border border-zinc-800 flex items-center justify-center uppercase font-bold text-[10px] text-zinc-700">Limited Drop</div>
    </section>

    <script>
        lucide.createIcons();
        function changeColor(color) {
            document.getElementById('cloth-preview').style.backgroundColor = color;
            if(color === '#ffffff') {
                document.getElementById('cloth-preview').querySelector('i').style.color = '#000';
            } else {
                document.getElementById('cloth-preview').querySelector('i').style.color = 'rgba(255,255,255,0.2)';
            }
        }
    </script>
</body>
</html>
