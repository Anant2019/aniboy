<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANI BOY | THE OMNI-ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Plus+Jakarta+Sans:wght@300;800&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #000; --bg: #fff; --primary: #000; }
        /* MODE: ON DUTY (Corporate) */
        .mode-on { --bg: #f8f8f8; --primary: #000; --accent: #666; font-family: 'Plus Jakarta Sans', sans-serif; }
        /* MODE: OFF DUTY (Rebel) */
        .mode-off { --bg: #050505; --primary: #fff; --accent: #00ff41; font-family: 'Syne', sans-serif; }

        body { background-color: var(--bg); color: var(--primary); transition: all 0.8s cubic-bezier(0.7, 0, 0.3, 1); overflow-x: hidden; }
        .unbounded { font-family: 'Unbounded', sans-serif; }
        
        /* The Aura Lab Canvas */
        #aura-canvas { 
            background: var(--bg); 
            border: 1px solid rgba(128,128,128,0.2); 
            transition: all 0.5s ease;
        }
        
        .shirt-base {
            width: 450px;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.1));
            transition: all 0.5s ease;
        }

        /* Draggable Logo Style */
        #user-logo { 
            position: absolute; 
            width: 80px; 
            cursor: move; 
            z-index: 50; 
            mix-blend-mode: multiply;
        }
        .mode-off #user-logo { mix-blend-mode: screen; }

        /* Vibe Switcher Component */
        .vibe-dock {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 10px; padding: 8px;
            background: rgba(0,0,0,0.1); backdrop-filter: blur(20px); border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .vibe-trigger { 
            padding: 12px 30px; border-radius: 100px; font-size: 11px; 
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.4s ease;
        }
        .active-vibe { background: var(--primary); color: var(--bg); transform: scale(1.1); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }
    </style>
</head>
<body class="mode-on">

    <nav class="fixed top-0 w-full z-[100] p-8 flex justify-between items-center mix-blend-difference text-white">
        <div class="unbounded text-2xl font-black italic tracking-tighter">ani boy.</div>
        <div class="flex gap-10 text-[10px] font-black uppercase tracking-[0.3em]">
            <a href="#lab" class="hover:text-zinc-400">The Lab</a>
            <a href="#shop" class="hover:text-zinc-400">Archive</a>
            <div class="relative cursor-pointer" onclick="toggleCart()">BAG <span id="count" class="text-[8px] absolute -top-2 -right-3 bg-white text-black px-1 rounded-full">0</span></div>
        </div>
    </nav>

    <header class="h-[80vh] flex flex-col justify-center items-center px-10">
        <h1 id="hero-title" class="unbounded text-[12vw] leading-[0.8] text-center font-black italic uppercase">
            RECODE<br><span class="opacity-10">ENTITY</span>
        </h1>
        <p class="mt-10 font-bold uppercase tracking-[1em] text-[10px] opacity-40">Engineering the Neo-Corporate Aura</p>
    </header>

    <section id="lab" class="min-h-screen py-20 px-10">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">
            
            <div id="aura-canvas" class="relative h-[600px] md:h-[750px] rounded-[3rem] overflow-hidden flex items-center justify-center">
                <div class="absolute top-10 left-10">
                    <span class="text-[10px] font-black uppercase tracking-widest opacity-50">Virtual_Mannequin_v4.0</span>
                </div>
                
                <img id="shirt-img" src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?q=80&w=800" class="shirt-base" alt="ani boy shirt">
                
                <img id="user-logo" src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="hidden" alt="Custom Logo">
                
                <div class="absolute bottom-10 left-10 right-10 flex justify-between items-end">
                    <div class="flex gap-3">
                        <button onclick="applyColor('grayscale(100%)')" class="w-8 h-8 rounded-full border border-black bg-zinc-400"></button>
                        <button onclick="applyColor('hue-rotate(240deg) brightness(0.7)')" class="w-8 h-8 rounded-full border border-black bg-blue-900"></button>
                        <button onclick="applyColor('none')" class="w-8 h-8 rounded-full border border-black bg-white"></button>
                    </div>
                    <p class="text-[9px] font-bold uppercase tracking-tighter max-w-[100px] leading-tight">Drag Logo to position</p>
                </div>
            </div>

            <div class="space-y-12">
                <div>
                    <h2 class="unbounded text-6xl font-black italic uppercase leading-none">Aura <br> Lab.</h2>
                    <p class="mt-6 text-zinc-500 font-medium leading-relaxed">In 2026, the uniform is not static. Upload your brand ID, position your mark, and recode your corporate presence.</p>
                </div>

                <div class="space-y-6">
                    <label class="block group cursor-pointer border-2 border-dashed border-zinc-200 p-12 rounded-[2rem] text-center hover:bg-zinc-50 hover:border-black transition-all">
                        <span class="unbounded text-[10px] font-black uppercase tracking-widest">Upload Custom Mark</span>
                        <input type="file" class="hidden" onchange="uploadLogo(event)">
                    </label>

                    <div class="flex items-center justify-between border-y border-zinc-100 py-6">
                        <span class="text-xs font-black uppercase italic">Custom Build Cost</span>
                        <span class="unbounded text-2xl font-black">₹7,999</span>
                    </div>

                    <button onclick="addToBag()" class="w-full bg-black text-white py-8 rounded-full unbounded text-[10px] font-black uppercase tracking-[0.4em] hover:scale-[1.02] transition-transform shadow-2xl">
                        Commit to Archive
                    </button>
                </div>
            </div>
        </div>
    </section>

    <div class="vibe-dock">
        <button id="on-duty" onclick="setMode('on')" class="vibe-trigger active-vibe">On Duty</button>
        <button id="off-duty" onclick="setMode('off')" class="vibe-trigger">Off Duty</button>
    </div>

    <div id="cart" class="fixed top-0 right-0 h-screen w-full md:w-[450px] bg-white text-black z-[200] translate-x-full transition-transform duration-700 p-12 flex flex-col">
        <div class="flex justify-between items-center mb-10">
            <h3 class="unbounded text-xl font-black uppercase italic">Inventory</h3>
            <button onclick="toggleCart()" class="font-bold text-xs">[X]</button>
        </div>
        <div id="cart-list" class="flex-grow italic text-zinc-400">Empty</div>
        <button class="w-full bg-black text-white py-6 rounded-full text-[10px] font-black uppercase tracking-widest">Checkout</button>
    </div>

    <script>
        gsap.registerPlugin(Draggable);

        // 1. THE MODE SWITCHER (The "Senior" Difference)
        function setMode(mode) {
            const body = document.body;
            const hero = document.getElementById('hero-title');
            
            if(mode === 'off') {
                body.className = 'mode-off';
                document.getElementById('off-duty').classList.add('active-vibe');
                document.getElementById('on-duty').classList.remove('active-vibe');
                hero.innerHTML = 'BREAK<br><span class="text-[#00ff41]">RULES</span>';
                gsap.to("#aura-canvas", { borderColor: "#00ff41", duration: 0.5 });
            } else {
                body.className = 'mode-on';
                document.getElementById('on-duty').classList.add('active-vibe');
                document.getElementById('off-duty').classList.remove('active-vibe');
                hero.innerHTML = 'RECODE<br><span class="opacity-10">ENTITY</span>';
                gsap.to("#aura-canvas", { borderColor: "rgba(0,0,0,0.1)", duration: 0.5 });
            }
        }

        // 2. AURA ENGINE: LOGO UPLOAD & DRAG
        function uploadLogo(event) {
            const file = event.target.files[0];
            const logo = document.getElementById('user-logo');
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    logo.src = e.target.result;
                    logo.classList.remove('hidden');
                    // Initialize Draggable after image is loaded
                    Draggable.create("#user-logo", {
                        bounds: "#aura-canvas",
                        inertia: true
                    });
                };
                reader.readAsDataURL(file);
            }
        }

        function applyColor(filter) {
            gsap.to("#shirt-img", { filter: filter, duration: 0.6 });
        }

        // 3. E-COMMERCE CORE
        let cart = 0;
        function addToBag() {
            cart++;
            document.getElementById('count').innerText = cart;
            gsap.from("#count", { scale: 2, duration: 0.3 });
            toggleCart();
        }

        function toggleCart() {
            const c = document.getElementById('cart');
            c.classList.toggle('translate-x-full');
        }

        // Entrance Animation
        gsap.from("#hero-title", { y: 200, opacity: 0, duration: 2, ease: "expo.out" });
    </script>
</body>
</html>
