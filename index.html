<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ani boy. | AI Virtual Tailor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --txt: #000; --line: rgba(0,0,0,0.08); }
        .rebel { --bg: #050505; --txt: #fff; --line: rgba(255,255,255,0.1); }
        
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; transition: 0.8s cubic-bezier(0.7,0,0.3,1); }
        .sync { font-family: 'Syncopate', sans-serif; }
        
        /* Linea-01 Grid Architecture */
        .shop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--line); border-bottom: 1px solid var(--line); }
        @media (min-width: 1024px) { .shop-grid { grid-template-columns: repeat(4, 1fr); } }
        .shop-item { background: var(--bg); padding: 2rem; transition: 0.4s; position: relative; }
        .shop-item:hover { background: rgba(0,0,0,0.01); }

        /* AI Try-On HUD with Calibration */
        #ai-lab { 
            position: fixed; inset: 0; background: #000; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #cam-feed { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: cyan; top: 0; box-shadow: 0 0 20px cyan; animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* Mode Switcher Dock */
        .dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; background: #000; padding: 6px; border-radius: 100px; display: flex; gap: 4px; border: 1px solid rgba(255,255,255,0.2); }
        .dock-btn { padding: 12px 28px; border-radius: 100px; font-size: 10px; font-weight: 900; color: #555; cursor: pointer; text-transform: uppercase; }
        .dock-btn.active { background: #fff; color: #000; }
        
        .product-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; filter: grayscale(1); transition: 0.5s; }
        .shop-item:hover .product-img { filter: grayscale(0); transform: scale(1.02); }
    </style>
</head>
<body class="on-duty">

    <header class="flex justify-between items-center px-10 py-8 border-b border-[var(--line)] sticky top-0 bg-[var(--bg)] z-[500]">
        <div class="sync text-2xl font-bold tracking-tighter italic">ani boy.</div>
        <div class="hidden lg:flex gap-12 text-[10px] font-bold uppercase tracking-widest">
            <a href="#" onclick="switchMode('on')">Corporate On-Duty</a>
            <a href="#" onclick="switchMode('off')">Rebel Off-Duty</a>
        </div>
        <div class="text-[10px] font-bold uppercase bg-black text-white px-4 py-2 rounded-full cursor-pointer" onclick="openLab()">AI Lab Try-On</div>
    </header>

    <section class="py-20 px-10">
        <h1 id="hero-title" class="sync text-[10vw] leading-[0.85] font-black uppercase tracking-tighter">ON-DUTY</h1>
        <p id="hero-desc" class="text-xs text-zinc-400 mt-6 uppercase tracking-[0.5em]">Minimalist Essentials for the Executive Recode</p>
    </section>

    <section class="shop-grid" id="main-catalog">
        </section>

    <div id="ai-lab">
        <div id="calibration-ui" class="absolute inset-0 z-[10001] flex flex-col items-center justify-center bg-black/80 text-white text-center p-10">
            <div class="w-24 h-24 border-4 border-cyan-500 rounded-full animate-ping mb-8"></div>
            <h2 class="sync text-3xl mb-4 uppercase">Calibrating Body...</h2>
            <p class="text-sm text-zinc-400 max-w-xs mb-8">Please stand 5 feet back. Ensure your shoulders are visible in the frame.</p>
            <button onclick="startScanning()" class="bg-cyan-500 text-black px-10 py-4 font-black uppercase text-xs tracking-widest">Start Scanning</button>
        </div>

        <div class="scanner-line"></div>
        <video id="cam-feed" autoplay playsinline></video>
        
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <img id="virtual-garment" src="" class="w-1/2 opacity-90 transition-all duration-500" style="display:none;">
        </div>

        <div class="absolute bottom-10 flex gap-4 z-[10002]">
            <button onclick="closeLab()" class="bg-white/10 text-white border border-white/20 px-8 py-4 rounded-full text-xs font-bold uppercase">Exit</button>
            <button onclick="captureFit()" class="bg-white text-black px-8 py-4 rounded-full text-xs font-bold uppercase">Capture Vibe</button>
        </div>
    </div>

    <div class="dock">
        <div id="btn-on" class="dock-btn active" onclick="switchMode('on')">On Duty</div>
        <div id="btn-off" class="dock-btn" onclick="switchMode('off')">Off Duty</div>
    </div>

    <script>
        const products = {
            on: [
                { name: "Executive Pima Tee", price: "₹2,499", type: "Plain Decent", img: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?q=80&w=600" },
                { name: "Recode White Shirt", price: "₹4,200", type: "Formal Plain", img: "https://images.unsplash.com/photo-1598033129183-c4f50c7176c8?q=80&w=600" },
                { name: "Signature Black Polo", price: "₹3,100", type: "Decent Plain", img: "https://images.unsplash.com/photo-1586363104862-3a5e2ab60d99?q=80&w=600" },
                { name: "Slate Grey Crew", price: "₹2,499", type: "Plain Decent", img: "https://images.unsplash.com/photo-1562157873-818bc0726f68?q=80&w=600" }
            ],
            off: [
                { name: "Cyber Samurai Print", price: "₹3,500", type: "Anime Printed", img: "https://images.unsplash.com/photo-1571945153237-4929e783ee4a?q=80&w=600" },
                { name: "Neo-Tokyo Oversized", price: "₹3,800", type: "Anime Printed", img: "https://images.unsplash.com/photo-1554568218-0f1715e72254?q=80&w=600" },
                { name: "Shibuya Night Shirt", price: "₹4,500", type: "Anime Printed", img: "https://images.unsplash.com/photo-1578587018452-892bacefd3f2?q=80&w=600" },
                { name: "Plain Rebel Black", price: "₹2,200", type: "Plain Rebel", img: "https://images.unsplash.com/photo-1503341504253-dff4815439fc?q=80&w=600" }
            ]
        };

        function switchMode(mode) {
            const body = document.body;
            document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');

            if(mode === 'off') {
                body.classList.add('rebel');
                document.getElementById('hero-title').innerText = "OFF-DUTY";
                document.getElementById('hero-desc').innerText = "Cyber-Prints & Anime Recodes";
                render(products.off);
            } else {
                body.classList.remove('rebel');
                document.getElementById('hero-title').innerText = "ON-DUTY";
                document.getElementById('hero-desc').innerText = "Minimalist Essentials for the Executive Recode";
                render(products.on);
            }
        }

        function render(items) {
            const grid = document.getElementById('main-catalog');
            grid.innerHTML = items.map(p => `
                <div class="shop-item">
                    <img src="${p.img}" class="product-img mb-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-[10px] font-black uppercase tracking-widest">${p.name}</h3>
                            <p class="text-[10px] text-zinc-500 font-mono mt-1">${p.type} / ${p.price}</p>
                        </div>
                        <button onclick="tryOn('${p.img}')" class="text-[9px] font-bold border-b border-zinc-300 uppercase">Try On</button>
                    </div>
                </div>
            `).join('');
            gsap.from(".shop-item", { opacity: 0, y: 20, duration: 1, stagger: 0.1 });
        }

        // --- GUIDED AI LAB LOGIC ---
        async function openLab() {
            document.getElementById('ai-lab').style.display = 'flex';
            const video = document.getElementById('cam-feed');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera Error: Please enable permissions.");
                closeLab();
            }
        }

        function startScanning() {
            gsap.to("#calibration-ui", { opacity: 0, pointerEvents: 'none', duration: 1 });
            // Simulate AI body mapping
            setTimeout(() => {
                const garment = document.getElementById('virtual-garment');
                if(garment.src) garment.style.display = 'block';
                alert("Scan Complete. Virtual Garment Locked.");
            }, 2000);
        }

        function tryOn(img) {
            document.getElementById('virtual-garment').src = img;
            openLab();
        }

        function closeLab() {
            document.getElementById('ai-lab').style.display = 'none';
            const video = document.getElementById('cam-feed');
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('calibration-ui').style.opacity = 1;
            document.getElementById('calibration-ui').style.pointerEvents = 'all';
        }

        switchMode('on');
    </script>
</body>
</html>
