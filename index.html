<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ani boy. | Virtual Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --txt: #000; --line: rgba(0,0,0,0.06); }
        .rebel { --bg: #000000; --txt: #fff; --line: rgba(255,255,255,0.1); }
        
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; transition: 0.8s cubic-bezier(0.7,0,0.3,1); }
        .sync { font-family: 'Syncopate', sans-serif; }
        
        /* Grid System (Linea-01 Style) */
        .l-grid { display: grid; grid-template-columns: repeat(1, 1fr); gap: 1px; background: var(--line); border-bottom: 1px solid var(--line); }
        @media (min-width: 1024px) { .l-grid { grid-template-columns: repeat(4, 1fr); } }
        .l-card { background: var(--bg); padding: 40px; position: relative; transition: 0.3s; }
        .l-card:hover { background: rgba(0,0,0,0.02); }
        .rebel .l-card:hover { background: rgba(255,255,255,0.03); }

        /* Camera Overlay for Virtual Try On */
        #vto-container { 
            position: fixed; inset: 0; background: #000; z-index: 5000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #vto-video { width: 100%; height: 100%; object-fit: cover; }
        #vto-overlay { position: absolute; width: 60%; max-width: 450px; pointer-events: none; mix-blend-mode: multiply; }
        .rebel #vto-overlay { mix-blend-mode: screen; filter: invert(1); }

        /* Mode Switcher Dock */
        .dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.9); padding: 6px; border-radius: 100px; display: flex; gap: 4px; }
        .dock-btn { padding: 12px 28px; border-radius: 100px; font-size: 10px; font-weight: 900; color: #777; cursor: pointer; text-transform: uppercase; }
        .dock-btn.active { background: #fff; color: #000; }
        .rebel .dock-btn.active { background: #fff; color: #000; }
    </style>
</head>
<body class="mode-on">

    <header class="flex justify-between items-center px-10 py-8 border-b border-[var(--line)]">
        <div class="sync text-xl font-bold tracking-tighter">ani boy.</div>
        <div class="hidden lg:flex gap-12 text-[10px] font-bold uppercase tracking-widest">
            <a href="#collection">Archive</a>
            <a href="#vto" onclick="startVTO('default')">Virtual Try-On</a>
            <a href="#">Contact</a>
        </div>
        <div class="text-[10px] font-bold uppercase">Bag (0)</div>
    </header>

    <section class="p-10 lg:p-20 text-center">
        <h1 id="hero-title" class="sync text-[12vw] leading-[0.8] uppercase font-bold italic tracking-tighter mb-8">ON-DUTY</h1>
        <p class="text-xs text-zinc-500 uppercase tracking-[0.6em]">Systematic Wear for the Modern Executive</p>
    </section>

    <section class="l-grid" id="product-feed">
        </section>

    <div id="vto-container">
        <div class="absolute top-10 left-10 z-[6000] text-white">
            <div class="sync text-xl">AI TRY-ON_MODE</div>
            <p class="text-[10px] opacity-50">Position yourself within the frame.</p>
        </div>
        <button onclick="stopVTO()" class="absolute top-10 right-10 z-[6000] text-white text-xs font-bold uppercase tracking-widest bg-white/10 px-6 py-2 rounded-full border border-white/20">Exit Lab</button>
        
        <video id="vto-video" autoplay playsinline></video>
        <img id="vto-overlay" src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?q=80&w=800" alt="Overlay">
        
        <div class="absolute bottom-10 flex gap-4">
            <button onclick="changeVTOShirt('hoodie')" class="bg-white px-6 py-3 text-[10px] font-bold uppercase rounded-full">Hoodie</button>
            <button onclick="changeVTOShirt('tee')" class="bg-white px-6 py-3 text-[10px] font-bold uppercase rounded-full">Classic Tee</button>
        </div>
    </div>

    <div class="dock">
        <div id="btn-on" class="dock-btn active" onclick="switchMode('on')">On Duty</div>
        <div id="btn-off" class="dock-btn" onclick="switchMode('off')">Off Duty</div>
    </div>

    <script>
        const catalog = {
            on: [
                { name: "Executive Blazer 01", price: "₹18,500", img: "https://images.unsplash.com/photo-1594932224440-946775b81016?q=80&w=600" },
                { name: "Recode Silk Shirt", price: "₹6,200", img: "https://images.unsplash.com/photo-1598033129183-c4f50c7176c8?q=80&w=600" },
                { name: "Logical Trousers", price: "₹5,800", img: "https://images.unsplash.com/photo-1473966968600-fa801b869a1a?q=80&w=600" },
                { name: "System Vest", price: "₹4,200", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=600" }
            ],
            off: [
                { name: "Anarchy Hoodie", price: "₹9,500", img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=600" },
                { name: "Glitch Graphic Tee", price: "₹3,200", img: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?q=80&w=600" },
                { name: "Chaos Cargos", price: "₹11,500", img: "https://images.unsplash.com/photo-1517441531661-5903e9e957ad?q=80&w=600" },
                { name: "Static Windbreaker", price: "₹14,000", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=600" }
            ]
        };

        function switchMode(mode) {
            const body = document.body;
            document.querySelectorAll('.dock-btn').forEach(d => d.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');

            if(mode === 'off') {
                body.classList.add('rebel');
                document.getElementById('hero-title').innerText = "OFF-DUTY";
                render(catalog.off);
            } else {
                body.classList.remove('rebel');
                document.getElementById('hero-title').innerText = "ON-DUTY";
                render(catalog.on);
            }
        }

        function render(items) {
            const feed = document.getElementById('product-feed');
            feed.innerHTML = items.map(p => `
                <div class="l-card">
                    <img src="${p.img}" class="w-full h-[400px] object-cover mb-8 grayscale hover:grayscale-0 transition-all duration-700 cursor-pointer" onclick="startVTO('${p.img}')">
                    <div class="flex justify-between items-start">
                        <div class="space-y-1">
                            <h3 class="text-[10px] font-black uppercase tracking-widest">${p.name}</h3>
                            <p class="text-[10px] opacity-40">${p.price}</p>
                        </div>
                        <button class="text-[9px] font-bold border-b border-zinc-200">Bag +</button>
                    </div>
                </div>
            `).join('');
            gsap.from(".l-card", { opacity: 0, y: 20, duration: 1, stagger: 0.1 });
        }

        // --- AI VIRTUAL TRY-ON (CAMERA INTEGRATION) ---
        async function startVTO(productImg) {
            const container = document.getElementById('vto-container');
            const video = document.getElementById('vto-video');
            const overlay = document.getElementById('vto-overlay');
            
            if(productImg !== 'default') overlay.src = productImg;
            container.style.display = 'flex';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera access denied. AI Try-on requires camera permissions.");
                stopVTO();
            }
        }

        function stopVTO() {
            const container = document.getElementById('vto-container');
            const video = document.getElementById('vto-video');
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            container.style.display = 'none';
        }

        function changeVTOShirt(type) {
            const overlay = document.getElementById('vto-overlay');
            if(type === 'hoodie') overlay.src = "https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=800";
            else overlay.src = "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?q=80&w=800";
        }

        // Init
        switchMode('on');
    </script>
</body>
</html>
